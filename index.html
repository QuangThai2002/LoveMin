<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>8/3 cho em ❤️</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(135deg,#ff9a9e,#ffc3a0);
display:flex;
align-items:center;
justify-content:center;
}

/* bảng chúc */

.box{
position:absolute;
background:rgba(255,255,255,0.25);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
color:white;
z-index:5;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
cursor:pointer;
}

/* hoa rơi */

.flower{
position:absolute;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

/* ảnh */

.photo{
position:absolute;
width:60px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:3s cubic-bezier(.17,.67,.43,1.5);
}

/* chữ cuối */

.love{
position:absolute;
top:60%;
left:52%;
transform:translate(-50%,-50%);
font-size:36px;
color:white;
font-weight:bold;
text-shadow:0 0 15px rgba(255,255,255,0.8);
background:rgba(0,0,0,0.25);
padding:5px 15px;
border-radius:20px;
}

.flyingHeart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:flyUp linear forwards;
}

@keyframes flyUp{
0%{
transform:translateY(100vh) scale(0.5);
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}
</style>
</head>

<body>

<div class="box" id="startBox">

<h1>🌸 Chúc mừng 8/3 🌸</h1>

<p>❤️ Chúc bé luôn xinh đẹp và hạnh phúc, 
cảm ơn vì sau tất cả mình vẫn nắm tay nhau và đi tiếp.</p>
<p>
Thay vì bé phải hạnh phúc thay vào đó chúng mình 
phải thật hạnh phúc nhé! ❤️</p>

<button onclick="startLove()">💖Yêu bé💖</button>

</div>

<div class="love" id="loveText"></div>

<script>

/* danh sách ảnh */

let images=[
"1.jpg",
"2.jpg",
"3.jpg",
"4.jpg",
"5.jpg",
"6.jpg",
"7.jpg",
"8.jpg",
"9.jpg",
"10.jpg",
"11.jpg",
"12.jpg"
];


/* hoa anh đào */

function flower(){

let f=document.createElement("div");

f.className="flower";

f.innerHTML="🌸";

f.style.left=Math.random()*100+"vw";

f.style.fontSize=(15+Math.random()*20)+"px";

f.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),9000);

}

setInterval(flower,250);


/* công thức trái tim */

function heartPos(i,total){

let angle=(i/total)*Math.PI*2;

let x=16*Math.pow(Math.sin(angle),3);

let y=13*Math.cos(angle)
-5*Math.cos(2*angle)
-2*Math.cos(3*angle)
-Math.cos(4*angle);

return{
x:x*18,
y:-y*18
};

}


/* bắt đầu hiệu ứng */

function startLove(){

document.getElementById("startBox").style.display="none";

setInterval(createHeart,250);

let total=50;

for(let i=0;i<total;i++){

let img=document.createElement("img");

img.src=images[Math.floor(Math.random()*images.length)];

img.className="photo";

img.style.left=Math.random()*100+"vw";

img.style.top="-50px";

document.body.appendChild(img);


/* rơi xuống */

setTimeout(()=>{

img.style.top=(40+Math.random()*40)+"vh";

},200);


/* tụ thành trái tim */

setTimeout(()=>{

let pos=heartPos(i,total);

img.style.left="calc(50vw + "+pos.x+"px)";
img.style.top="calc(50vh + "+pos.y+"px)";

},3000);

}

function createHeart(){

let heart=document.createElement("div");

heart.className="flyingHeart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*100)+"px";

heart.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

}
/* chữ anh yêu em */

let love="Anh yêu em ❤️";

let i=0;

function typing(){

if(i<love.length){

document.getElementById("loveText").innerHTML+=love.charAt(i);

i++;

setTimeout(typing,120);

}

}

setTimeout(typing,5000);

}

</script>

</body>
</html>
