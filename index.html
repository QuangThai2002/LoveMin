<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc em 8/3 ❤️</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#ffc3a0);
font-family:sans-serif;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
}
body.heart-mode{
transform:scale(0.7);
transform-origin:center;
transition:1s;
}
.container{
background:rgba(255,255,255,0.25);
padding:30px;
border-radius:20px;
width:80%;
max-width:350px;
backdrop-filter: blur(10px);
z-index:2;
width:100vw;
    height:100vh;
    overflow:hidden;
}

h1{
font-size:28px;
}

p{
font-size:16px;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
cursor:pointer;
}

/* hoa anh đào */

.flower{
position:absolute;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* trái tim */

.heart{
position:absolute;
color:#ff4d6d;
animation:heartFloat linear forwards;
}

@keyframes heartFloat{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* chữ cuối */

.loveText{
position:absolute;
font-size:40px;
font-weight:bold;
top:45%;
left:50%;
transform:translate(-50%,-50%);
opacity:0;
transition:2s;
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Chúc mừng 8/3 🌸</h1>

<p>Chúc em luôn xinh đẹp và hạnh phúc ❤️</p>

<button id="loveBtn" onclick="startLove()">Yêu bé 💖</button>

</div>

<div class="loveText" id="loveText">Anh yêu em ❤️</div>

<script>

/* ảnh của bạn */

let images=[
"1.jpg",
"2.jpg",
"3.jpg",
"4.jpg",
"5.jpg",
"7.jpg",
"9.jpg",
"10.jpg",
"11.jpg",
"12.jpg"
];

/* hoa anh đào rơi */

function createFlower(){

let flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.fontSize=(15+Math.random()*25)+"px";

flower.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),10000);

}

setInterval(createFlower,300);


/* tạo hình trái tim */

function heartPosition(i,total){

let angle=(i/total)*Math.PI*2;

let x=16*Math.pow(Math.sin(angle),3);

let y=13*Math.cos(angle)
-5*Math.cos(2*angle)
-2*Math.cos(3*angle)
-Math.cos(4*angle);

return {x:x*15,y:-y*15};

}


/* hiệu ứng ảnh */

function startLove(){

document.querySelector(".container").classList.add("heart-mode");

let total=40;

for(let i=0;i<total;i++){

let img=document.createElement("img");

img.src=images[Math.floor(Math.random()*images.length)];

img.style.position="absolute";
img.style.width="80px";
img.style.borderRadius="15px";

img.style.left=Math.random()*100+"vw";
img.style.top="-200px";

img.style.transition="3s";

document.body.appendChild(img);

/* rơi xuống */

setTimeout(()=>{
img.style.top=(40+Math.random()*40)+"vh";
},100);

/* tụ thành hình trái tim */

setTimeout(()=>{

let pos=heartPosition(i,total);

img.style.left="calc(50vw + "+pos.x+"px)";
img.style.top="calc(50vh + "+pos.y+"px)";

},3000);

}

setTimeout(()=>{

document.getElementById("loveText").style.opacity=1;

},5000);

}

</script>

</body>
</html>
